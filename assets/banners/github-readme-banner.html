<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .banner {
    width: 1500px;
    height: 500px;
    background: linear-gradient(135deg, #0F766E 0%, #115E59 40%, #0D3B3B 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
  }

  /* Decorative geometric factory shapes */
  .geometry {
    position: absolute;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
  }
  .geo-1 { width: 120px; height: 80px; top: 60px; left: 100px; }
  .geo-1::after {
    content: '';
    position: absolute; top: -20px; left: 30px;
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 20px solid rgba(255,255,255,0.06);
  }
  .geo-2 { width: 80px; height: 50px; top: 200px; left: 80px; border-radius: 2px; }
  .geo-3 { width: 100px; height: 65px; bottom: 80px; left: 140px; }
  .geo-4 { width: 90px; height: 55px; top: 70px; right: 160px; }
  .geo-5 { width: 140px; height: 85px; bottom: 60px; right: 100px; }
  .geo-5::after {
    content: '';
    position: absolute; top: -24px; left: 40px;
    width: 0; height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 24px solid rgba(255,255,255,0.06);
  }
  .geo-6 { width: 60px; height: 40px; top: 280px; right: 200px; border-radius: 2px; }

  /* Subtle grid lines */
  .grid-line {
    position: absolute;
    background: rgba(255,255,255,0.04);
  }
  .grid-h { width: 100%; height: 1px; top: 40%; }
  .grid-v { width: 1px; height: 100%; left: 60%; }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 80px;
    max-width: 1100px;
  }

  /* Logo mark */
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 40px;
    height: 32px;
    border: 2px solid rgba(255,255,255,0.6);
    position: relative;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    top: -10px; left: 8px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 10px solid rgba(255,255,255,0.6);
  }
  .logo-text {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.1em;
  }

  /* Headline */
  .headline {
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: 0.02em;
  }
  .headline .accent {
    color: #FBBF24;
  }

  /* Subtitle */
  .subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.65);
    margin-top: 16px;
    font-weight: 400;
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  /* Tag row */
  .tags {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 28px;
  }
  .tag {
    padding: 6px 18px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.25);
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  /* Bottom line */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #FBBF24, #F59E0B, #D97706);
  }
</style>
</head>
<body>
  <div class="banner">

    <!-- Geometric decorations -->
    <div class="geometry geo-1"></div>
    <div class="geometry geo-2"></div>
    <div class="geometry geo-3"></div>
    <div class="geometry geo-4"></div>
    <div class="geometry geo-5"></div>
    <div class="geometry geo-6"></div>
    <div class="grid-line grid-h"></div>
    <div class="grid-line grid-v"></div>

    <!-- Main content -->
    <div class="content">
      <div class="logo-mark">
        <div class="logo-icon"></div>
        <span class="logo-text">广澜租赁 · GUANGLAN RENTAL</span>
      </div>

      <h1 class="headline">
        印刷人的厂房，<span class="accent">就该懂你。</span>
      </h1>

      <p class="subtitle">
        广澜印刷包装旗下厂房租赁平台 — 为印刷包装同行提供配套齐全、参数透明的专业生产空间
      </p>

      <div class="tags">
        <span class="tag">小型厂房 &lt;100㎡</span>
        <span class="tag">中型厂房 100-500㎡</span>
        <span class="tag">大型厂房 &gt;500㎡</span>
      </div>
    </div>

    <div class="bottom-line"></div>
  </div>
</body>
</html>
